# .github/workflows/release.yml
name: Release

on:
    push:
        tags: ['v*'] # шире: сработает и для v1.2.3-rc.1
    workflow_dispatch: {} # можно запустить руками из Actions

permissions:
    contents: write # нужно для создания GitHub Release
    id-token: write # нужно для npm --provenance

jobs:
    publish:
        name: Publish to npm
        runs-on: ubuntu-latest
        env:
            NODE_OPTIONS: --experimental-vm-modules
            CI: true

        steps:
            - uses: actions/checkout@v4

            - name: Use Node 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
                  registry-url: 'https://registry.npmjs.org/'
                  cache: npm
                  scope: '@rotcetihra'
                  always-auth: true

            - name: Install deps
              run: npm ci

            # Тесты и сборка до публикации — ок, но избегаем дубля при npm publish
            - name: Test
              run: npm test

            - name: Build (tsc)
              run: npm run src:build

            - name: Build docs (typedoc) # <— ДОБАВЛЕНО: чтобы docs.tgz не был пустым
              run: npm run docs:build

            # Тег должен совпадать с версией в package.json
            - name: Verify tag matches package.json version
              run: |
                  PKG_VERSION=$(node -p "require('./package.json').version")
                  TAG_VERSION=${GITHUB_REF_NAME#v}
                  echo "package.json: $PKG_VERSION; tag: $TAG_VERSION"
                  if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
                    echo "❌ Tag v$TAG_VERSION != package.json version $PKG_VERSION"
                    exit 1
                  fi

            # Что именно улетит в npm (и сработает ли provenance)
            - name: Pack (dry-run)
              run: npm publish --access public --provenance --dry-run

            # Публикуем без повторного прогона скриптов (чтобы не дублировать test/build)
            # Если хочешь оставить prepublishOnly — убери флаг --ignore-scripts.
            - name: Publish (public, with provenance)
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # Automation token из npm
              run: npm publish --access public --provenance --ignore-scripts

            # .github/workflows/release.yml (фрагмент с конца job)
            # Сохраняем точный npm-тарбол (как уже делали)
            - name: Create npm tarball
              run: |
                  PKG_TGZ=$(npm pack --silent)
                  echo "PKG_TGZ=$PKG_TGZ" >> $GITHUB_ENV

            # ВЫТАЩИТЬ СЕКЦИЮ ИЗ CHANGELOG ДЛЯ ЭТОГО ТЕГА (vX.Y.Z -> X.Y.Z)
            - name: Extract changelog section for this version
              id: notes
              shell: bash
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  if [ ! -f CHANGELOG.md ]; then
                      echo "❌ CHANGELOG.md не найден"; exit 1
                  fi
                  node - <<'NODE' || true
                  const fs = require('fs');
                  const rawVersion = process.env.VERSION || '';
                  const version = rawVersion.replace(/^v/, '');
                  const md = fs.readFileSync('CHANGELOG.md','utf8');
                  const lines = md.split(/\r?\n/);
                  const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
                  const isHeading = l => /^#{2,6}\s+/.test(l);
                  // Матчим заголовки вида:
                  // ## 1.2.3   | ## v1.2.3   | ## [1.2.3]   | ## [v1.2.3] - 2025-09-26  | со ссылками
                  const re = new RegExp(`^\\[?v?${esc(version)}\\]?([\\s\\-\\]]|$)`, 'i');
                  const start = lines.findIndex(l => isHeading(l) && re.test(l.replace(/^#{2,6}\s+/, '').trim()));
                  if (start < 0) {
                      process.exitCode = 2;
                  } else {
                      let end = start + 1;
                      while (end < lines.length && !isHeading(lines[end])) end++;
                      const out = lines.slice(start, end).join('\n').trim() + '\n';
                      fs.writeFileSync('RELEASE_NOTES.md', out);
                  }
                  NODE
                  if [ -s RELEASE_NOTES.md ]; then
                      echo "found=true" >> $GITHUB_OUTPUT
                  else
                      echo "found=false" >> $GITHUB_OUTPUT
                      echo "❌ В CHANGELOG.md нет секции для версии ${VERSION}"
                      # Если хочешь фейлить релиз, раскомментируй:
                      exit 1
                  fi
                  env:
                  VERSION: ${{ github.ref_name }}

            # Упаковываем артефакты
            - name: Pack release assets
              run: |
                  tar -czf dist.tgz dist
                  tar -czf docs.tgz docs || true

            # Вариант 1: секция найдена — используем её как тело релиза
            - name: Create GitHub Release (with CHANGELOG section)
              if: steps.notes.outputs.found == 'true'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: ${{ github.ref_name }}
                  body_path: RELEASE_NOTES.md
                  prerelease: ${{ contains(github.ref_name, '-') }}
                  files: |
                      ${{ env.PKG_TGZ }}
                      dist.tgz
                      docs.tgz
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # Вариант 2: секцию не нашли — можно fallback'нуть к autogenerated notes
            - name: Create GitHub Release (auto notes fallback)
              if: steps.notes.outputs.found != 'true'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: ${{ github.ref_name }}
                  generate_release_notes: true
                  prerelease: ${{ contains(github.ref_name, '-') }}
                  files: |
                      ${{ env.PKG_TGZ }}
                      dist.tgz
                      docs.tgz
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
