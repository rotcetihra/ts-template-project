# .github/workflows/release.yml
name: Release

on:
    push:
        tags: ['v*'] # Триггер по тэгам vX.Y.Z (включая пререлизы типа v1.2.3-rc.1)
    workflow_dispatch: {} # Ручной запуск на случай твоей очередной «идеи»

permissions:
    contents: write # Нужно, чтобы создать GitHub Release
    id-token: write # Нужно для npm --provenance (OIDC подпись)

jobs:
    publish:
        name: GitHub Release → npm publish (только если релиз ок)
        runs-on: ubuntu-latest
        env:
            NODE_OPTIONS: --experimental-vm-modules
            CI: true

        steps:
            - uses: actions/checkout@v4

            - name: Use Node 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
                  registry-url: 'https://registry.npmjs.org/'
                  cache: npm
                  scope: '@rotcetihra'
                  always-auth: true

            - name: Install deps
              run: npm ci

            - name: Test
              run: npm test

            - name: Build (tsc)
              run: npm run src:build

            - name: Build docs (typedoc)
              run: npm run docs:build

            # Тег vX.Y.Z обязан совпадать с package.json.version
            - name: Verify tag matches package.json version
              run: |
                  PKG_VERSION=$(node -p "require('./package.json').version")
                  TAG_VERSION=${GITHUB_REF_NAME#v}
                  echo "package.json: $PKG_VERSION; tag: $TAG_VERSION"
                  if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
                    echo "❌ Tag v$TAG_VERSION != package.json version $PKG_VERSION"
                    exit 1
                  fi

            # Не тратим время на релиз, если такая версия уже есть в npm
            - name: Ensure version is new on npm
              run: |
                  NAME=$(node -p "require('./package.json').name")
                  VERSION=$(node -p "require('./package.json').version")
                  if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
                    echo "❌ $NAME@$VERSION уже опубликован в npm. Подними версию и перезапусти."
                    exit 1
                  fi

            # Секция из CHANGELOG.md для текущей версии → RELEASE_NOTES.md
            - name: Extract changelog section for this version
              id: notes
              shell: bash
              run: |
                  set -euo pipefail
                  VERSION="${GITHUB_REF_NAME#v}"

                  if [ ! -f CHANGELOG.md ]; then
                    echo "❌ CHANGELOG.md не найден"; exit 1
                  fi

                  V_ESC="${VERSION//./\\.}"
                  PATTERN="^##[[:space:]]+\\[?v?${V_ESC}\\]?([[:space:]]+[-–][[:space:]].*)?$"

                  START="$(grep -n -E "$PATTERN" CHANGELOG.md | head -1 | cut -d: -f1 || true)"
                  if [ -z "${START}" ]; then
                    echo "❌ В CHANGELOG.md нет секции для версии ${VERSION}"
                    echo "— Найденные заголовки:"
                    grep -n -E '^##[[:space:]]+\[?v?[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md || true
                    exit 1
                  fi

                  END="$(awk -v s="$START" 'NR>s && /^##[[:space:]]+/{print NR; exit}' CHANGELOG.md)"
                  if [ -z "${END}" ]; then
                    END="$(wc -l < CHANGELOG.md)"; END=$((END + 1))
                  fi

                  sed -n "${START},$((END-1))p" CHANGELOG.md \
                    | sed -e :a -e '/^\n*$/{$d;N;ba' > RELEASE_NOTES.md

                  [ -s RELEASE_NOTES.md ] || { echo "❌ RELEASE_NOTES.md пуст"; exit 1; }

                  echo "found=true" >> "$GITHUB_OUTPUT"

            # Готовим вложения к релизу (dist, docs, плюс точный npm-тарбол)
            - name: Create npm tarball
              run: |
                  PKG_TGZ=$(npm pack --silent)
                  echo "PKG_TGZ=$PKG_TGZ" >> $GITHUB_ENV

            - name: Pack release assets
              run: |
                  tar -czf dist.tgz dist
                  tar -czf docs.tgz docs || true

            # СОЗДАНИЕ GITHUB RELEASE — КЛЮЧЕВОЙ ГЕЙТ
            - name: Create GitHub Release (CHANGELOG section)
              id: gh_release
              continue-on-error: true # не обрываем job сразу — нам нужно пропустить npm шаг
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }} # vX.Y.Z
                  name: ${{ github.ref_name }}
                  body_path: RELEASE_NOTES.md
                  prerelease: ${{ contains(github.ref_name, '-') }}
                  files: |
                      ${{ env.PKG_TGZ }}
                      dist.tgz
                      docs.tgz
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # ПУБЛИКУЕМ В NPM ТОЛЬКО ЕСЛИ РЕЛИЗ СОЗДАЛСЯ УСПЕШНО
            - name: Publish to npm (only if GH release succeeded)
              if: steps.gh_release.outcome == 'success'
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # Automation token
              run: npm publish --access public --provenance

            # Если релиз не создался — явно валим job, чтобы всё было честно
            - name: Fail because GitHub Release failed
              if: steps.gh_release.outcome != 'success'
              run: |
                  echo "❌ GitHub Release не создан — публикацию в npm пропустили."
                  exit 1
