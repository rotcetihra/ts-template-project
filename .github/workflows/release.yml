# .github/workflows/release.yml
name: Release

on:
    push:
        tags: ['v*'] # vX.Y.Z и пререлизы (v1.2.3-rc.1)
    workflow_dispatch: {} # ручной запуск

permissions:
    contents: write # создание GitHub Release
    packages: write # публикация в GitHub Packages
    id-token: write # для npm --provenance (OIDC)

jobs:
    publish:
        name: GitHub Release → npmjs → GitHub Packages
        runs-on: ubuntu-latest
        env:
            NODE_OPTIONS: --experimental-vm-modules
            CI: true

        steps:
            - uses: actions/checkout@v4

            - name: Use Node 20 (npmjs registry)
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
                  registry-url: https://registry.npmjs.org/
                  cache: npm
                  scope: '@rotcetihra'
                  always-auth: true

            - name: Install deps
              run: npm ci

            - name: Test
              run: npm test

            - name: Build (tsc)
              run: npm run src:build

            - name: Build docs (typedoc)
              run: npm run docs:build

            - name: Verify tag matches package.json version
              run: |
                  PKG_VERSION=$(node -p "require('./package.json').version")
                  TAG_VERSION=${GITHUB_REF_NAME#v}
                  echo "package.json: $PKG_VERSION; tag: $TAG_VERSION"
                  if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
                    echo "❌ Tag v$TAG_VERSION != package.json version $PKG_VERSION"
                    exit 1
                  fi

            - name: Ensure version is new on npmjs
              run: |
                  NAME=$(node -p "require('./package.json').name")
                  VERSION=$(node -p "require('./package.json').version")
                  if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
                    echo "❌ $NAME@$VERSION уже опубликован в npmjs. Подними версию и перезапусти."
                    exit 1
                  fi

            - name: Extract changelog section for this version
              id: notes
              shell: bash
              run: |
                  set -euo pipefail
                  VERSION="${GITHUB_REF_NAME#v}"
                  [ -f CHANGELOG.md ] || { echo "❌ CHANGELOG.md не найден"; exit 1; }

                  V_ESC="${VERSION//./\\.}"
                  PATTERN="^##[[:space:]]+\\[?v?${V_ESC}\\]?([[:space:]]+[-–][[:space:]].*)?$"
                  START="$(grep -n -E "$PATTERN" CHANGELOG.md | head -1 | cut -d: -f1 || true)"
                  if [ -z "${START}" ]; then
                    echo "❌ В CHANGELOG.md нет секции для версии ${VERSION}"
                    grep -n -E '^##[[:space:]]+\[?v?[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md || true
                    exit 1
                  fi
                  END="$(awk -v s="$START" 'NR>s && /^##[[:space:]]+/{print NR; exit}' CHANGELOG.md)"
                  if [ -z "${END}" ]; then END="$(wc -l < CHANGELOG.md)"; END=$((END + 1)); fi
                  sed -n "${START},$((END-1))p" CHANGELOG.md > RELEASE_NOTES.md
                  [ -s RELEASE_NOTES.md ] || { echo "❌ RELEASE_NOTES.md пуст — парсинг не удался"; exit 1; }
                  echo "found=true" >> "$GITHUB_OUTPUT"

            - name: Create npm tarball
              run: |
                  PKG_TGZ=$(npm pack --silent)
                  echo "PKG_TGZ=$PKG_TGZ" >> $GITHUB_ENV

            - name: Pack release assets
              run: |
                  tar -czf dist.tgz dist
                  tar -czf docs.tgz docs || true

            # ——— GITHUB RELEASE (гейт для публикаций) ———
            - name: Create GitHub Release (CHANGELOG section)
              id: gh_release
              continue-on-error: true
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: ${{ github.ref_name }}
                  body_path: RELEASE_NOTES.md
                  prerelease: ${{ contains(github.ref_name, '-') }}
                  files: |
                      ${{ env.PKG_TGZ }}
                      dist.tgz
                      docs.tgz
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # ——— npmjs.org — публикуем только если релиз создан ———
            - name: Publish to npmjs (only if GH release succeeded)
              if: steps.gh_release.outcome == 'success'
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # Automation token
              run: npm publish --access public --provenance --ignore-scripts

            # ——— GitHub Packages — отдельный setup-node с переключением реестра ———
            - name: Use Node 20 (GitHub Packages registry)
              if: steps.gh_release.outcome == 'success'
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
                  registry-url: https://npm.pkg.github.com
                  scope: '@rotcetihra'
                  always-auth: true

            - name: Publish to GitHub Packages (only if GH release succeeded)
              if: steps.gh_release.outcome == 'success'
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # хватает при permissions.packages: write
              shell: bash
              run: |
                  set -euo pipefail
                  NAME=$(node -p "require('./package.json').name")
                  VERSION=$(node -p "require('./package.json').version")

                  echo "registry: $(npm config get registry)"
                  echo "whoami: $(npm whoami)"

                  if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
                    echo "::notice::$NAME@$VERSION уже есть в GitHub Packages — пропускаю публикацию."
                  else
                    npm publish --ignore-scripts
                  fi

            # ——— Если релиз не создался — фейлим job и нигде не публикуем ———
            - name: Fail because GitHub Release failed
              if: steps.gh_release.outcome != 'success'
              run: |
                  echo "❌ GitHub Release не создан — публикации в реестры пропущены."
                  exit 1
