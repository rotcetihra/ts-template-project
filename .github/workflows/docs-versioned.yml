# .github/workflows/docs-versioned.yml
name: Docs (versioned)

on:
    push:
        tags: ['v*'] # каждый релиз-тег публикует свою версию док

permissions:
    contents: write

jobs:
    docs:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout source at tag
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Use Node 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
                  cache: npm

            - name: Install deps
              run: npm ci

            - name: Build docs
              run: npm run docs:build

            - name: Prepare gh-pages worktree
              run: |
                  git fetch origin gh-pages || true
                  git worktree add --detach site origin/gh-pages || git worktree add -B gh-pages site
                  cd site
                  git checkout -B gh-pages || true
                  touch .nojekyll   # иначе GitHub Pages отфильтрует некоторые файлы :contentReference[oaicite:3]{index=3}

            - name: Put docs under /<version>, update versions.json and index
              run: |
                  set -euo pipefail
                  VERSION="${GITHUB_REF_NAME#v}"
                  MAJOR_MINOR="${VERSION%.*}"

                  mkdir -p "site/${VERSION}"
                  rsync -a --delete docs/ "site/${VERSION}/"

                  # Обновляем список версий
                  VERS_FILE="site/versions.json"
                  if [ -f "$VERS_FILE" ]; then
                    TMP=$(mktemp)
                    jq --arg v "$VERSION" '([.[]] + [$v]) | unique | sort_by(. | split(".") | map(tonumber)) | reverse' "$VERS_FILE" > "$TMP" || echo '[]' > "$TMP"
                    mv "$TMP" "$VERS_FILE"
                  else
                    printf '[ "%s" ]\n' "$VERSION" > "$VERS_FILE"
                  fi

                  # Пишем простой index.html с переключателем версий и редиректом на последнюю
                  cat > site/index.html <<'HTML'
                  <!doctype html><html lang="en"><meta charset="utf-8"/>
                  <meta name="viewport" content="width=device-width,initial-scale=1"/>
                  <title>API Docs</title>
                  <style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Helvetica,Arial,sans-serif;padding:24px;margin:0 auto}header{display:flex;justify-content:space-between;align-items:center;gap:16px}select{font:inherit;padding:6px 10px}</style>
                  <header>
                    <h1>@rotcetihra/ts-template-project — API Docs</h1>
                    <label>Version <select id="ver"></select></label>
                  </header>
                  <hr/>
                  <iframe id="frame" src="" style="width:100%;height:80vh;border:0"></iframe>
                  <script>
                    (function () {
                    const sel = document.getElementById('ver');
                    const frame = document.getElementById('frame');

                    // Простой semver-сравнитель: 1.10.0 > 1.2.9
                    function cmp(a, b) {
                        const pa = String(a).replace(/^v/, '').split('.').map(n => parseInt(n, 10) || 0);
                        const pb = String(b).replace(/^v/, '').split('.').map(n => parseInt(n, 10) || 0);
                        for (let i = 0; i < 3; i++) {
                        if (pa[i] !== pb[i]) return pb[i] - pa[i];
                        }
                        return 0;
                    }

                    // Кэш-бастер: не даём GitHub Pages подсовывать старый файл
                    fetch('./versions.json?ts=' + Date.now())
                        .then(r => r.json())
                        .then(list => {
                        // Нормализуем массив версий
                        const versions = (Array.isArray(list) ? list : [])
                            .map(v => String(v).trim())
                            .filter(Boolean)
                            .sort(cmp);

                        if (!versions.length) throw new Error('versions.json пустой');

                        // Наполняем селект
                        sel.innerHTML = '';
                        for (const v of versions) {
                            const o = document.createElement('option');
                            o.value = v; o.textContent = v;
                            sel.appendChild(o);
                        }

                        // Текущая версия из URL или последняя (максимальная)
                        const urlV = new URL(location.href).searchParams.get('v');
                        const current = versions.includes(urlV) ? urlV : versions[0];

                        sel.value = current;
                        frame.src = `./${current}/index.html`;

                        sel.addEventListener('change', () => {
                            const v = sel.value;
                            // перезагружаем страницу с ?v=, чтобы была шаримая ссылка
                            location.search = '?v=' + encodeURIComponent(v);
                        });
                        })
                        .catch(e => {
                        console.error('Не смог загрузить versions.json:', e);
                        sel.replaceWith(document.createTextNode('Ошибка загрузки списка версий'));
                        });
                    })();
                    </script>
                  HTML

                  cd site
                  git add -A
                  git -c user.name="github-actions" -c user.email="actions@users.noreply.github.com" commit -m "docs: ${VERSION}" || echo "no changes"
                  git push origin gh-pages
