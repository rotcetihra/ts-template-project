# .github/workflows/ci.yml
name: CI # Название workflow. Видно в списке Actions.

on:
    push:
        branches: [main] # Запускаем на пуши в main
    pull_request:
        branches: [main] # И на PR, открытые против main

# Если ты пушишь новую ревизию — старую сборку с тем же ref убиваем.
concurrency:
    group: ci-${{ github.ref }} # Группа отмен — одна на ветку/тег.
    cancel-in-progress: true # Отменять запущенные, если пришёл новый пуш.

jobs:
    test:
        name: Test (Node ${{ matrix.node }}) # Имя job'а в интерфейсе
        runs-on: ubuntu-latest # Хост: Linux runner
        strategy:
            fail-fast: false # Не останавливать всю матрицу из-за одного падения
            matrix:
                node: [18.x, 20.x, 22.x] # Гоним тесты на трёх версиях Node
        env:
            # Jest с ESM иногда устраивает спектакль «Cannot use import outside a module».
            # Этот флаг включает VM-модули в Node и гасит истерику.
            NODE_OPTIONS: --experimental-vm-modules
            # Включает CI-режим во многих тулзах (меньше шума, иногда жёстче поведение).
            CI: true

        steps:
            - uses: actions/checkout@v4 # Клонируем репозиторий в раннер

            - name: Use Node ${{ matrix.node }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }} # Версия Node из матрицы
                  cache: npm # Кэшируем ~/.npm по package-lock.json

            - name: Install deps (clean)
              run: npm ci # Чистая установка зависимостей из lock-файла

            - name: Run tests
              run: npm test -- --coverage # Запуск Jest; второй «--» передаёт флаги внутрь Jest

            - name: Upload coverage
              if: always() # Загружаем отчёты даже если тесты упали
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-${{ matrix.node }} # Имя артефакта: покрытие на конкретной версии Node
                  path: coverage # Папка с отчётами Jest (lcov, текст, json)

    build:
        name: Build + TypeDoc
        runs-on: ubuntu-latest
        needs: test # Запустится только после успешного job'а test
        env:
            NODE_OPTIONS: --experimental-vm-modules # На всякий случай — для скриптов которые трогают ESM
            CI: true

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20.x # Для сборки достаточно одной версии
                  cache: npm

            - name: Install deps
              run: npm ci

            - name: Build
              run: npm run src:build # Твой tsc-билд (tsconfig.build.json)

            - name: Generate docs
              run: npm run docs:build # Генерация TypeDoc в ./docs

            - name: Inspect build output
              run: |
                  echo "=== tsc version ==="
                  npx tsc -v
                  echo "=== emitted files (tsc report) ==="
                  npx tsc -p tsconfig.build.json --listFiles --listEmittedFiles || true
                  echo "=== dist tree ==="
                  if [ -d dist ]; then
                      find dist -maxdepth 2 -type f -print
                  else
                      echo "dist/ отсутствует"
                  fi

            - name: Upload dist
              if: ${{ hashFiles('dist/**') != '' }} # грузим артефакт только если там хоть что-то есть
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist

            - name: Upload docs
              if: ${{ hashFiles('docs/**') != '' }}
              uses: actions/upload-artifact@v4
              with:
                  name: docs
                  path: docs
